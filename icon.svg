<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#1a1a1e"/>
      <stop offset="100%" stop-color="#0c0c0f"/>
    </linearGradient>
    <linearGradient id="pile" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a2e38"/>
      <stop offset="35%" stop-color="#4a5060"/>
      <stop offset="65%" stop-color="#3a3e4e"/>
      <stop offset="100%" stop-color="#1e2028"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2820"/>
      <stop offset="100%" stop-color="#1a1810"/>
    </linearGradient>
    <radialGradient id="impact" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9500" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#ff6000" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff4000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-orange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle gloss -->
  <ellipse cx="256" cy="55" rx="190" ry="65" fill="white" opacity="0.03"/>

  <!-- Ground plane -->
  <rect x="60" y="370" width="392" height="80" rx="6" fill="url(#ground)"/>
  <line x1="60" y1="370" x2="452" y2="370" stroke="#5a5040" stroke-width="2"/>
  <!-- Ground hatch lines -->
  <line x1="90"  y1="370" x2="70"  y2="395" stroke="#3a3020" stroke-width="1.5" opacity="0.6"/>
  <line x1="130" y1="370" x2="110" y2="395" stroke="#3a3020" stroke-width="1.5" opacity="0.6"/>
  <line x1="170" y1="370" x2="150" y2="395" stroke="#3a3020" stroke-width="1.5" opacity="0.6"/>
  <line x1="210" y1="370" x2="190" y2="395" stroke="#3a3020" stroke-width="1.5" opacity="0.6"/>
  <line x1="250" y1="370" x2="230" y2="395" stroke="#3a3020" stroke-width="1.5" opacity="0.6"/>
  <line x1="290" y1="370" x2="270" y2="395" stroke="#3a3020" stroke-width="1.5" opacity="0.6"/>
  <line x1="330" y1="370" x2="310" y2="395" stroke="#3a3020" stroke-width="1.5" opacity="0.6"/>
  <line x1="370" y1="370" x2="350" y2="395" stroke="#3a3020" stroke-width="1.5" opacity="0.6"/>
  <line x1="410" y1="370" x2="390" y2="395" stroke="#3a3020" stroke-width="1.5" opacity="0.6"/>
  <line x1="450" y1="370" x2="430" y2="395" stroke="#3a3020" stroke-width="1.5" opacity="0.6"/>

  <!-- Pile tube body -->
  <rect x="218" y="155" width="76" height="215" fill="url(#pile)"/>
  <!-- Steel seam lines -->
  <line x1="218" y1="220" x2="294" y2="220" stroke="#5a6070" stroke-width="1" opacity="0.5"/>
  <line x1="218" y1="285" x2="294" y2="285" stroke="#5a6070" stroke-width="1" opacity="0.5"/>
  <line x1="218" y1="350" x2="294" y2="350" stroke="#5a6070" stroke-width="1" opacity="0.5"/>
  <!-- Pile outline -->
  <rect x="218" y="155" width="76" height="215" fill="none" stroke="#7a8090" stroke-width="2"/>
  <!-- Pile tip (triangle) -->
  <polygon points="218,370 294,370 256,410" fill="#3a3e4e" stroke="#7a8090" stroke-width="1.5"/>

  <!-- Depth measurement arrows -->
  <line x1="170" y1="155" x2="170" y2="370" stroke="#3a9fff" stroke-width="1.5" opacity="0.5" stroke-dasharray="6,4"/>
  <polygon points="170,155 163,175 177,175" fill="#3a9fff" opacity="0.7"/>
  <polygon points="170,370 163,350 177,350" fill="#3a9fff" opacity="0.7"/>

  <!-- Impact / shock wave at top (orange glow) -->
  <ellipse cx="256" cy="158" rx="80" ry="22" fill="url(#impact)" filter="url(#glow-orange)"/>
  <!-- Shockwave rings -->
  <ellipse cx="256" cy="148" rx="50" ry="10" fill="none" stroke="#ff9500" stroke-width="3" opacity="0.8"/>
  <ellipse cx="256" cy="140" rx="72" ry="16" fill="none" stroke="#ff7000" stroke-width="2" opacity="0.5"/>
  <ellipse cx="256" cy="130" rx="96" ry="22" fill="none" stroke="#ff5000" stroke-width="1.5" opacity="0.25"/>

  <!-- Hammer head top -->
  <rect x="210" y="105" width="92" height="50" rx="6" fill="#2e3240" stroke="#5a6070" stroke-width="2"/>
  <rect x="225" y="110" width="62" height="10" rx="3" fill="#4a5060" opacity="0.6"/>
</svg>
